<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yovatrans — Tâches</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#f0f4ff;--white:#ffffff;--border:rgba(99,130,255,0.15);--border2:rgba(99,130,255,0.28);
    --blue-50:#eff3ff;--blue-100:#dce5ff;--blue-400:#7b9ef8;--blue-500:#4f72f5;--blue-600:#3a5ce4;--blue-700:#2a47cc;
    --navy:#1a2c6e;--text2:#4a5580;--muted:#8a95b8;--grad-main:linear-gradient(135deg,#4f72f5 0%,#7c4fe0 100%);
    --grad-soft:linear-gradient(135deg,#eff3ff 0%,#e8e4ff 100%);--grad-hero:linear-gradient(160deg,#1e3a8a 0%,#3a5ce4 45%,#7c4fe0 100%);
    --grad-accent:linear-gradient(90deg,#4f72f5,#7c4fe0);--shadow-sm:0 1px 4px rgba(79,114,245,0.09);
    --shadow:0 4px 18px rgba(79,114,245,0.13);--shadow-lg:0 14px 44px rgba(79,114,245,0.2);
    --green:#10b981;--red:#ef4444;--orange:#f59e0b;--purple:#7c4fe0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;background-image:radial-gradient(ellipse 70% 50% at 15% -5%,rgba(79,114,245,0.09) 0%,transparent 60%),radial-gradient(ellipse 55% 40% at 85% 105%,rgba(124,79,224,0.07) 0%,transparent 60%)}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--grad-hero);display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 30px rgba(30,58,138,0.3)}
  .sb-top{padding:30px 26px 22px;border-bottom:1px solid rgba(255,255,255,0.1)}.logo{display:flex;align-items:center;gap:11px}.logo-icon{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}.logo-icon img{width:34px;height:34px;object-fit:contain}.logo-name{font-weight:800;font-size:1.2rem;color:#fff;letter-spacing:-0.02em}.logo-sub{font-size:0.65rem;color:rgba(255,255,255,0.45);font-weight:400;letter-spacing:0.05em;margin-top:1px}
  .nav{padding:18px 14px;flex:1}.nav-section{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.14em;color:rgba(255,255,255,0.35);padding:0 12px;margin:14px 0 5px}.nav-section:first-child{margin-top:0}.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:0.875rem;font-weight:500;color:rgba(255,255,255,0.6);text-decoration:none;transition:all 0.18s;margin-bottom:2px}.nav-item:hover{color:#fff;background:rgba(255,255,255,0.1)}.nav-item.active{color:#fff;background:rgba(255,255,255,0.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.18)}.nav-item svg{width:17px;height:17px;flex-shrink:0}.sb-footer{padding:14px 26px;border-top:1px solid rgba(255,255,255,0.1);font-size:0.7rem;color:rgba(255,255,255,0.3)}
  .main{margin-left:240px;padding:36px 40px;max-width:calc(100vw - 240px)}.breadcrumb{display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--muted);margin-bottom:22px}.breadcrumb a{color:var(--blue-500);text-decoration:none;font-weight:700}.breadcrumb a:hover{color:var(--blue-700)}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:18px}.page-title{font-size:1.95rem;font-weight:800;letter-spacing:-0.04em;color:var(--navy)}.page-subtitle{font-size:0.875rem;color:var(--muted);margin-top:4px}.header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn-primary,.btn-outline,.btn-danger,.btn-green{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:0.875rem;padding:11px 18px;border-radius:11px;cursor:pointer;transition:all .2s;text-decoration:none;white-space:nowrap}.btn-primary{background:var(--grad-main);color:#fff;border:none;box-shadow:0 4px 16px rgba(79,114,245,0.38)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(79,114,245,0.48)}.btn-outline{background:var(--white);border:1.5px solid var(--border2);color:var(--blue-600);box-shadow:var(--shadow-sm)}.btn-outline:hover{border-color:var(--blue-500);box-shadow:var(--shadow)}.btn-danger{background:rgba(239,68,68,.06);border:1.5px solid rgba(239,68,68,.3);color:#dc2626}.btn-danger:hover{background:rgba(239,68,68,.12);border-color:#ef4444}.btn-green{background:rgba(16,185,129,.1);border:1.5px solid rgba(16,185,129,.25);color:#059669}.btn-green:hover{background:rgba(16,185,129,.17);border-color:#10b981}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}.stat-card{background:var(--white);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:20px;position:relative;overflow:hidden}.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-accent)}.stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:800}.stat-value{font-size:2.05rem;font-weight:800;line-height:1;margin-top:8px}.stat-hint{font-size:.72rem;color:var(--muted);margin-top:5px}
  .toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center}.search-wrap{flex:1;position:relative}.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);width:16px;height:16px}.search-input,.filter-select,.form-input,.form-select,.form-textarea{background:var(--white);border:1.5px solid var(--border);color:var(--navy);font:0.875rem 'Plus Jakarta Sans',sans-serif;padding:11px 14px;border-radius:11px;outline:none;box-shadow:var(--shadow-sm);transition:border-color .18s}.search-input{width:100%;padding-left:42px}.filter-select{min-width:170px;cursor:pointer}.search-input:focus,.filter-select:focus,.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue-500)}.form-textarea{width:100%;min-height:120px;resize:vertical;line-height:1.5}.form-input,.form-select{width:100%}.form-label{display:block;font-size:.74rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);font-weight:800;margin-bottom:7px}.form-group{margin-bottom:16px}.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.form-row.three{grid-template-columns:repeat(3,1fr)}
  .table-wrap,.card{background:var(--white);border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}.table-wrap table{width:100%;border-collapse:collapse}thead tr{background:linear-gradient(90deg,var(--blue-50) 0%,rgba(232,228,255,.6) 100%);border-bottom:1px solid var(--border)}th{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--text2);padding:13px 18px;text-align:left;font-weight:800;cursor:pointer;user-select:none;white-space:nowrap}td{padding:14px 18px;font-size:.875rem;vertical-align:middle}tbody tr{border-bottom:1px solid rgba(99,130,255,.07);cursor:pointer;transition:background .15s}tbody tr:hover{background:linear-gradient(90deg,rgba(79,114,245,.04),rgba(124,79,224,.03))}tbody tr:last-child{border-bottom:none}.task-cell{display:flex;align-items:center;gap:12px}.task-icon{width:42px;height:42px;border-radius:13px;background:var(--grad-main);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.78rem;flex-shrink:0;box-shadow:0 2px 8px rgba(79,114,245,.3)}.task-title{font-weight:800;color:var(--navy);line-height:1.3}.task-sub{font-size:.75rem;color:var(--muted);margin-top:2px;max-width:520px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.view-link{font-size:.84rem;font-weight:800;color:var(--text2);cursor:pointer;text-decoration:none;transition:all .18s}.view-link:hover{color:var(--blue-600);transform:translateX(2px)}
  .badge{display:inline-block;font-size:.67rem;font-weight:800;padding:4px 10px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}.badge-green{background:rgba(16,185,129,.1);color:#059669}.badge-red{background:rgba(239,68,68,.1);color:#dc2626}.badge-yellow{background:rgba(245,158,11,.12);color:#d97706}.badge-blue{background:var(--blue-100);color:var(--blue-700)}.badge-gray{background:rgba(138,149,184,.12);color:var(--text2)}.badge-purple{background:rgba(124,79,224,.12);color:#6d28d9}.badge-orange{background:rgba(249,115,22,.12);color:#ea580c}
  .pagination{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-top:1px solid var(--border);background:linear-gradient(90deg,#fff,var(--blue-50))}.pag-info{font-size:.78rem;color:var(--muted);font-weight:600}.pag-btns{display:flex;gap:6px}.pag-btn{border:1.5px solid var(--border);background:#fff;color:var(--text2);border-radius:9px;padding:7px 10px;font-weight:800;font-size:.76rem;cursor:pointer}.pag-btn.active{background:var(--grad-main);color:#fff;border-color:transparent}.pag-btn:disabled{opacity:.45;cursor:not-allowed}
  .card-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,var(--blue-50),#fff)}.card-title{font-size:.92rem;font-weight:900;color:var(--navy)}.card-body{padding:20px}.layout-two{display:grid;grid-template-columns:1fr 360px;gap:20px}.detail-hero{background:var(--white);border-radius:22px;box-shadow:var(--shadow);border:1px solid var(--border);padding:30px 32px;margin-bottom:20px;position:relative;overflow:hidden}.detail-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--grad-accent)}.detail-title{font-size:1.6rem;font-weight:900;letter-spacing:-.03em;margin-bottom:7px}.detail-sub{color:var(--muted);font-size:.9rem}.meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.meta-item{padding:13px;border:1px solid var(--border);border-radius:13px;background:linear-gradient(135deg,#fff,var(--blue-50))}.meta-key{font-size:.68rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em}.meta-val{font-size:.86rem;font-weight:800;margin-top:4px;color:var(--navy);word-break:break-word}.timeline{display:flex;flex-direction:column;gap:10px}.timeline-item{display:flex;gap:10px;padding:12px;border:1px solid var(--border);border-radius:13px;background:#fff}.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--blue-500);margin-top:5px;flex-shrink:0}.timeline-text{font-size:.82rem;color:var(--text2);line-height:1.4}.empty{padding:44px 20px;text-align:center;color:var(--muted);font-weight:700}.notice{border:1.5px solid var(--border2);background:var(--blue-50);border-radius:14px;padding:14px 16px;color:var(--text2);font-size:.85rem;line-height:1.5;margin-bottom:16px}.success-msg{display:none;border:1.5px solid rgba(16,185,129,.25);background:rgba(16,185,129,.08);color:#047857;border-radius:12px;padding:12px 14px;font-weight:800;font-size:.84rem;margin-bottom:16px}.success-msg.show{display:block}.error-msg{display:none;border:1.5px solid rgba(239,68,68,.25);background:rgba(239,68,68,.07);color:#dc2626;border-radius:12px;padding:12px 14px;font-weight:800;font-size:.84rem;margin-bottom:16px}.error-msg.show{display:block}
  @media(max-width:1100px){.stats-grid{grid-template-columns:repeat(2,1fr)}.layout-two{grid-template-columns:1fr}.form-row,.form-row.three{grid-template-columns:1fr}.toolbar{flex-wrap:wrap}.filter-select{min-width:0;flex:1}.main{padding:28px 24px}}
</style>

</head>
<body>
<div id="sidebar-mount"></div>
<main class="main">
  <div class="page-header">
    <div><h1 class="page-title">To-do list</h1><p class="page-subtitle">Tâches manuelles et tâches détectées par IA à valider ou à traiter.</p></div>
    <div class="header-actions"><a class="btn-outline" href="ajoutetache.html">+ Ajouter manuellement</a></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">—</div><div class="stat-hint">Toutes les tâches</div></div>
    <div class="stat-card"><div class="stat-label">À faire</div><div class="stat-value" id="stat-todo">—</div><div class="stat-hint">Validées et ouvertes</div></div>
    <div class="stat-card"><div class="stat-label">À valider</div><div class="stat-value" id="stat-validate">—</div><div class="stat-hint">Proposées par IA</div></div>
    <div class="stat-card"><div class="stat-label">Terminées</div><div class="stat-value" id="stat-done">—</div><div class="stat-hint">Cochées comme faites</div></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" class="search-input" id="searchInput" placeholder="Rechercher une tâche, un mail, un expéditeur..."></div>
    <select class="filter-select" id="filterStatus"><option value="">Tous les statuts</option><option value="TO_VALIDATE">À valider</option><option value="TODO">À faire</option><option value="IN_PROGRESS">En cours</option><option value="WAITING">En attente</option><option value="DONE">Terminée</option><option value="CANCELLED">Annulée</option></select>
    <select class="filter-select" id="filterCategory"><option value="">Tous les types</option><option value="REPLY_EMAIL">Répondre à un mail</option><option value="VERIFY_INVOICE">Vérifier une facture</option><option value="FOLLOW_UP">Relancer quelqu’un</option><option value="READ_RESPONSE">Lire une réponse attendue</option><option value="SIGN_DOCUMENT">Signer un document</option><option value="SEND_DOCUMENT">Envoyer un document</option><option value="CHECK_ATTACHMENT">Vérifier une pièce jointe</option><option value="CONFIRM_INFO">Confirmer une information</option></select>
    <select class="filter-select" id="filterPriority"><option value="">Toutes priorités</option><option value="LOW">Basse</option><option value="NORMAL">Normale</option><option value="HIGH">Haute</option><option value="URGENT">Urgente</option></select>
  </div>
  <div class="table-wrap">
    <table><thead><tr><th data-sort="title" onclick="sortBy('title')">Tâche</th><th data-sort="category" onclick="sortBy('category')">Type</th><th data-sort="priority" onclick="sortBy('priority')">Priorité</th><th data-sort="status" onclick="sortBy('status')">Statut</th><th data-sort="dueDate" onclick="sortBy('dueDate')">Échéance</th><th>Actions</th></tr></thead><tbody id="tbody"></tbody></table>
    <div class="pagination" id="pagination"></div>
  </div>
</main>
<script src="api.js"></script><script src="sidebar.js" data-page="tasks"></script><script src="liste.js"></script>
</body></html>
