<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yovatrans - Vehicules</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f0f4ff;--white:#fff;--border:rgba(99,130,255,0.15);--border2:rgba(99,130,255,0.28);
    --blue-50:#eff3ff;--blue-100:#dce5ff;--blue-400:#7b9ef8;--blue-500:#4f72f5;--blue-600:#3a5ce4;--blue-700:#2a47cc;
    --navy:#1a2c6e;--text2:#4a5580;--muted:#8a95b8;--grad-main:linear-gradient(135deg,#4f72f5 0%,#7c4fe0 100%);
    --grad-soft:linear-gradient(135deg,#eff3ff 0%,#e8e4ff 100%);--grad-hero:linear-gradient(160deg,#1e3a8a 0%,#3a5ce4 45%,#7c4fe0 100%);
    --grad-accent:linear-gradient(90deg,#4f72f5,#7c4fe0);--shadow-sm:0 1px 4px rgba(79,114,245,0.09);
    --shadow:0 4px 18px rgba(79,114,245,0.13);--shadow-lg:0 14px 44px rgba(79,114,245,0.2);
  }
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--grad-hero);display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 30px rgba(30,58,138,0.3)}
  .sb-top{padding:30px 26px 22px;border-bottom:1px solid rgba(255,255,255,0.1)}
  .logo{display:flex;align-items:center;gap:11px}
  .logo-icon{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
  .logo-name{font-weight:800;font-size:1.2rem;color:#fff;letter-spacing:-0.02em}
  .logo-sub{font-size:0.65rem;color:rgba(255,255,255,0.45);font-weight:400;letter-spacing:0.05em;margin-top:1px}
  .nav{padding:18px 14px;flex:1}
  .nav-section{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.14em;color:rgba(255,255,255,0.35);padding:0 12px;margin:14px 0 5px}
  .nav-section:first-child{margin-top:0}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:0.875rem;font-weight:500;color:rgba(255,255,255,0.6);text-decoration:none;transition:all 0.18s;margin-bottom:2px}
  .nav-item:hover{color:#fff;background:rgba(255,255,255,0.1)}
  .nav-item.active{color:#fff;background:rgba(255,255,255,0.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.18)}
  .nav-item svg{width:17px;height:17px;flex-shrink:0}
  .sb-footer{padding:14px 26px;border-top:1px solid rgba(255,255,255,0.1);font-size:0.7rem;color:rgba(255,255,255,0.3)}

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;
    background-image:radial-gradient(ellipse 70% 50% at 15% -5%,rgba(79,114,245,0.09) 0%,transparent 60%),radial-gradient(ellipse 55% 40% at 85% 105%,rgba(124,79,224,0.07) 0%,transparent 60%);}
  .main{margin-left:240px;padding:36px 40px}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
  .page-title{font-size:1.95rem;font-weight:800;letter-spacing:-0.04em}
  .page-subtitle{font-size:0.875rem;color:var(--muted);margin-top:4px}
  .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--grad-main);color:#fff;font:700 0.85rem 'Plus Jakarta Sans',sans-serif;padding:11px 22px;border:none;border-radius:11px;cursor:pointer;box-shadow:0 4px 16px rgba(79,114,245,0.38);transition:all .2s}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(79,114,245,0.48)}
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
  .stat-card{background:var(--white);border-radius:18px;padding:20px 22px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden}
  .stat-stripe{position:absolute;top:0;left:0;right:0;height:3px}.s1{background:var(--grad-accent)}.s2{background:linear-gradient(90deg,#10b981,#34d399)}.s3{background:linear-gradient(90deg,#f59e0b,#fbbf24)}.s4{background:linear-gradient(90deg,#7c4fe0,#a78bfa)}
  .stat-top{display:flex;justify-content:space-between;margin-bottom:10px}.stat-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:800}
  .ic1{background:var(--blue-50)}.ic2{background:rgba(16,185,129,0.1)}.ic3{background:rgba(245,158,11,0.1)}.ic4{background:rgba(124,79,224,0.1)}
  .stat-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted);font-weight:700}.stat-value{font-size:2.1rem;font-weight:800;line-height:1}.stat-hint{font-size:0.7rem;color:var(--muted);margin-top:3px}
  .toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center}
  .search-wrap{flex:1;position:relative}.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);width:16px;height:16px}
  .search-input,.filter-select{background:var(--white);border:1.5px solid var(--border);color:var(--navy);font:0.875rem 'Plus Jakarta Sans',sans-serif;padding:10px 14px;border-radius:11px;outline:none;box-shadow:var(--shadow-sm)}
  .search-input{width:100%;padding-left:42px}.filter-select{min-width:170px;cursor:pointer}
  .view-toggle{display:flex;border-radius:11px;overflow:hidden;border:1.5px solid var(--border);background:var(--white);box-shadow:var(--shadow-sm)}
  .view-btn{background:none;border:none;color:var(--muted);padding:9px 13px;cursor:pointer;display:flex;align-items:center}.view-btn.active{background:var(--grad-main);color:#fff}.view-btn svg{width:16px;height:16px}
  .table-wrap{background:var(--white);border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
  table{width:100%;border-collapse:collapse}thead tr{background:linear-gradient(90deg,var(--blue-50) 0%,rgba(232,228,255,0.6) 100%);border-bottom:1px solid var(--border)}
  th{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.09em;color:var(--text2);padding:13px 18px;text-align:left;font-weight:700;cursor:pointer;white-space:nowrap}
  th.sorted{color:var(--blue-600)}tbody tr{border-bottom:1px solid rgba(99,130,255,0.07);cursor:pointer;transition:background .15s}tbody tr:hover{background:linear-gradient(90deg,rgba(79,114,245,0.04),rgba(124,79,224,0.03))}
  td{padding:14px 18px;font-size:0.875rem;vertical-align:middle}.driver-cell{display:flex;align-items:center;gap:12px}.avatar-ph,.card-av-ph{width:40px;height:40px;border-radius:50%;background:var(--grad-main);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.75rem;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(79,114,245,0.3)}
  .driver-name,.card-name{font-weight:700;color:var(--navy)}.driver-sub,.card-phone{font-size:0.75rem;color:var(--muted)}
  .view-link{font-size:0.84rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .18s}.view-link:hover{color:var(--blue-600);transform:translateX(2px)}
  .badge{display:inline-block;font-size:0.67rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.04em;text-transform:uppercase}.badge-green{background:rgba(16,185,129,0.1);color:#059669}.badge-red{background:rgba(239,68,68,0.1);color:#dc2626}.badge-yellow{background:rgba(245,158,11,0.12);color:#d97706}.badge-blue{background:var(--blue-100);color:var(--blue-700)}.badge-gray{background:rgba(138,149,184,0.12);color:var(--text2)}
  .grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .driver-card{background:var(--white);border-radius:18px;border:1px solid var(--border);padding:22px;cursor:pointer;transition:all .22s;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .driver-card::before{content:'';position:absolute;top:0;left:0;right:0;height:80px;background:var(--grad-soft);border-radius:18px 18px 60% 60%;transform:scaleX(1.15);z-index:0}.driver-card>*{position:relative;z-index:1}.driver-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg)}
  .card-av-ph{width:54px;height:54px;font-size:0.9rem;margin-bottom:12px}.card-meta{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-top:1px solid rgba(99,130,255,0.1);background:linear-gradient(90deg,var(--blue-50),rgba(238,232,255,0.4))}
  .pag-info{font-size:0.78rem;color:var(--muted);font-weight:500}.pag-btns{display:flex;gap:4px}.pag-btn{background:var(--white);border:1.5px solid var(--border);color:var(--text2);font-size:0.8rem;padding:5px 12px;border-radius:8px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600}.pag-btn.active{background:var(--grad-main);color:#fff;border-color:transparent}
  .pag-btn[disabled]{opacity:.5;cursor:not-allowed}.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
  @media (max-width:1100px){.stats-bar{grid-template-columns:repeat(2,1fr)}.toolbar{flex-wrap:wrap}.main{padding:26px 20px}}
  @media (max-width:820px){.main{margin-left:0;padding:20px}.page-header{flex-direction:column;gap:14px}.stats-bar{grid-template-columns:1fr}}
</style>
<link rel="stylesheet" href="responsive.css">
</head>
<body>
<div id="sidebar-mount"></div>

<main class="main">
  <div class="page-header">
    <div>
      <h1 class="page-title">Vehicules</h1>
      <p class="page-subtitle">Gerez votre flotte et les echeances reglementaires</p>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-primary" onclick="window.location.href='tracking.html'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 12-9 12S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Carte flotte
      </button>
      <button class="btn-primary" onclick="window.location.href='add-vehicule.html'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau vehicule
      </button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-stripe s1"></div><div class="stat-top"><div class="stat-ico ic1">VH</div></div><div class="stat-label">Total</div><div class="stat-value" id="stat-total">—</div><div class="stat-hint">Vehicules enregistres</div></div>
    <div class="stat-card"><div class="stat-stripe s2"></div><div class="stat-top"><div class="stat-ico ic2">ON</div></div><div class="stat-label">Actifs</div><div class="stat-value" id="stat-active">—</div><div class="stat-hint">En exploitation</div></div>
    <div class="stat-card"><div class="stat-stripe s3"></div><div class="stat-top"><div class="stat-ico ic3">LOC</div></div><div class="stat-label">Loues</div><div class="stat-value" id="stat-rented">—</div><div class="stat-hint">Avec contrat location</div></div>
    <div class="stat-card"><div class="stat-stripe s4"></div><div class="stat-top"><div class="stat-ico ic4">AL</div></div><div class="stat-label">Alertes docs</div><div class="stat-value" id="stat-alerts">—</div><div class="stat-hint">Sous 60 jours ou expires</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Rechercher par immatriculation, marque, modele, VIN...">
    </div>
    <select class="filter-select" id="filterStatut">
      <option value="">Tous les statuts</option>
      <option value="actif">Actif</option>
      <option value="maintenance">Maintenance</option>
      <option value="hors_service">Hors service</option>
    </select>
    <select class="filter-select" id="filterPossession">
      <option value="">Toutes possessions</option>
      <option value="propre">Propre</option>
      <option value="loue">Loue</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="btnTable" onclick="setView('table')" title="Tableau">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="view-btn" id="btnGrid" onclick="setView('grid')" title="Grille">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
    </div>
  </div>

  <div id="tableView">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="immatriculation" onclick="sortBy('immatriculation')">Vehicule</th>
            <th data-sort="type_vehicule" onclick="sortBy('type_vehicule')">Type</th>
            <th data-sort="mode_possession" onclick="sortBy('mode_possession')">Possession</th>
            <th data-sort="assurance_expiration" onclick="sortBy('assurance_expiration')">Assurance</th>
            <th data-sort="controle_technique_expiration" onclick="sortBy('controle_technique_expiration')">Controle tech.</th>
            <th data-sort="statut" onclick="sortBy('statut')">Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="pagination" id="pag1"></div>
    </div>
  </div>

  <div id="gridView" style="display:none">
    <div class="grid-view" id="grid"></div>
    <div style="margin-top:14px;background:var(--white);border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--border)">
      <div class="pagination" id="pag2" style="background:transparent;border:none"></div>
    </div>
  </div>
</main>

<script src="api.js"></script>
<script src="sidebar.js" data-page="vehicles"></script>
<script src="vehicules.js"></script>
</body>
</html>
